name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  package:
    name: Skill package checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show tool versions
        run: |
          python3 --version
          python3 -m py_compile scripts/validate_package.py
          python3 -m py_compile skills/kamae-scala-review/scripts/review_probe.py

      - name: Validate skill package
        run: python3 scripts/validate_package.py

      - name: Smoke review probe
        run: |
          python3 skills/kamae-scala-review/scripts/review_probe.py \
            skills/kamae-scala/examples/src/main/scala \
            --json

  scala:
    name: Skill example checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: package

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: sbt

      - name: Setup sbt
        uses: sbt/setup-sbt@v1

      - name: Show tool versions
        run: |
          java -version
          sbt --version
          sbt "show scalaVersion" "show sbtVersion" | tail -n +1

      - name: Check formatting
        run: sbt scalafmtCheckAll

      - name: Check scalafix
        run: sbt "scalafixAll --check"

      - name: Compile examples
        run: sbt "project taxiRequest" compile Test/compile

      - name: Test examples
        run: sbt "project taxiRequest" test

      - name: Generate Scaladoc
        run: sbt "project taxiRequest" doc
