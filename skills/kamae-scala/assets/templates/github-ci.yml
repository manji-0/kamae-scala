name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  domain:
    name: Domain checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: sbt

      - name: Setup sbt
        uses: sbt/setup-sbt@v1

      - name: Check formatting
        run: sbt scalafmtCheckAll

      - name: Check scalafix
        run: sbt "scalafixAll --check"

      - name: Compile
        run: sbt compile Test/compile

      - name: Test
        run: sbt test

      - name: Generate Scaladoc
        run: sbt doc

      - name: Kamae review probe
        run: python3 path/to/kamae-scala/skills/kamae-scala-review/scripts/review_probe.py src/main/scala --json
        continue-on-error: true
